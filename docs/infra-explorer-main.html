<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntelliLake Infrastructure Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #d2a8ff;
    --accent4: #f0883e;
    --accent5: #ff7b72;
    --accent6: #79c0ff;
    --accent7: #ffa657;
    --node-bg: #21262d;
    --node-hover: #292e36;
    --radius: 8px;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: auto 1fr auto;
  }

  /* ── Tab bar ── */
  .tab-bar {
    grid-column: 1 / 3;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    padding: 0 16px;
    gap: 0;
  }

  .tab-btn {
    padding: 10px 20px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .tab-btn:hover { color: var(--text); background: rgba(88,166,255,0.05); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-title {
    display: flex;
    align-items: center;
    padding: 10px 0;
    margin-right: auto;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.3px;
    padding-right: 24px;
  }

  .tab-title span {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 11px;
    margin-left: 10px;
  }

  /* ── Tab content areas ── */
  .tab-content { display: none; }
  .tab-content.active { display: contents; }

  /* ── Sidebar (Tab 1) ── */
  .sidebar {
    grid-row: 2 / 4;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .control-group {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .control-group-header {
    background: var(--surface2);
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .control-group-header::after { content: '\25BE'; font-size: 10px; }
  .control-group.collapsed .control-group-body { display: none; }
  .control-group.collapsed .control-group-header::after { content: '\25B8'; }

  .control-group-body {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .preset-btn {
    display: block;
    width: 100%;
    padding: 8px 12px;
    background: var(--node-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }

  .preset-btn:hover { background: var(--node-hover); border-color: var(--accent); }
  .preset-btn.active { border-color: var(--accent); background: rgba(88,166,255,0.1); }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 6px 10px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 5px;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { background: var(--node-bg); }
  .filter-btn.active { background: rgba(88,166,255,0.08); }

  .filter-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Canvas (Tab 1) ── */
  .canvas-area {
    position: relative;
    overflow: hidden;
    background: var(--bg);
    cursor: grab;
  }

  .canvas-area:active { cursor: grabbing; }

  .canvas-inner {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }

  svg.diagram { display: block; }

  .node-group { cursor: pointer; }
  .node-group:hover .node-rect { stroke: var(--accent); stroke-width: 2; }
  .node-rect {
    fill: var(--node-bg);
    stroke: var(--border);
    stroke-width: 1;
    rx: 8; ry: 8;
    transition: fill 0.15s, stroke 0.15s;
  }

  .node-group.selected .node-rect { stroke: var(--accent); stroke-width: 2; fill: rgba(88,166,255,0.08); }
  .node-group.dimmed { opacity: 0.2; }
  .node-group.dimmed .node-rect { stroke: var(--border); stroke-width: 1; }

  .node-title { fill: var(--text); font-size: 13px; font-weight: 600; font-family: inherit; }
  .node-subtitle { fill: var(--text-dim); font-size: 11px; font-family: var(--mono); }
  .node-badge { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-family: inherit; }
  .node-badge-bg { rx: 4; ry: 4; opacity: 0.2; }

  .connection { fill: none; stroke-width: 1.5; opacity: 0.5; transition: opacity 0.2s; }
  .connection.dimmed { opacity: 0.06; }
  .connection.highlighted { opacity: 0.9; stroke-width: 2; }
  .connection-arrow { transition: opacity 0.2s; }
  .connection-arrow.dimmed { opacity: 0.06; }
  .connection-arrow.highlighted { opacity: 0.9; }

  .layer-label { fill: var(--text-dim); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.4; font-family: inherit; }
  .layer-line { stroke: var(--border); stroke-width: 1; stroke-dasharray: 4 4; opacity: 0.3; }

  .detail-panel {
    position: absolute;
    top: 16px; right: 16px;
    width: 340px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    z-index: 10;
    display: none;
    max-height: calc(100% - 32px);
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .detail-panel.visible { display: block; }

  .detail-close {
    position: absolute; top: 8px; right: 8px;
    width: 24px; height: 24px;
    border: none; background: transparent;
    color: var(--text-dim); font-size: 16px;
    cursor: pointer; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }

  .detail-close:hover { background: var(--node-bg); color: var(--text); }
  .detail-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; padding-right: 24px; }
  .detail-path { font-size: 11px; font-family: var(--mono); color: var(--accent); margin-bottom: 12px; word-break: break-all; }
  .detail-desc { font-size: 13px; line-height: 1.5; color: var(--text-dim); margin-bottom: 12px; }
  .detail-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin: 12px 0 6px; }
  .detail-list { list-style: none; display: flex; flex-direction: column; gap: 3px; }
  .detail-list li { font-size: 12px; color: var(--text); padding: 3px 0; }
  .detail-tag { display: inline-block; padding: 2px 8px; background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.2); border-radius: 4px; font-size: 11px; color: var(--accent); margin: 2px 4px 2px 0; }

  .zoom-controls { position: absolute; bottom: 16px; left: 16px; display: flex; gap: 4px; z-index: 5; }
  .zoom-btn {
    width: 32px; height: 32px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }

  .zoom-btn:hover { background: var(--node-hover); border-color: var(--accent); }
  .zoom-label { height: 32px; padding: 0 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); font-size: 11px; display: flex; align-items: center; font-family: var(--mono); }

  .legend { position: absolute; bottom: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; z-index: 5; display: flex; gap: 14px; font-size: 11px; color: var(--text-dim); flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-line { width: 20px; height: 2px; border-radius: 1px; }

  /* ── Prompt bar ── */
  .prompt-bar {
    grid-column: 1 / 3;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    min-height: 60px;
  }

  .prompt-text {
    flex: 1;
    font-size: 13px; line-height: 1.5;
    color: var(--text-dim);
    font-family: var(--mono);
    white-space: pre-wrap;
    max-height: 80px;
    overflow-y: auto;
  }

  .copy-btn {
    padding: 6px 14px; background: var(--accent); color: #0d1117;
    border: none; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: background 0.15s;
  }

  .copy-btn:hover { background: #79c0ff; }
  .copy-btn.copied { background: var(--accent2); }

  /* ── Deployment Flow (Tab 2) ── */
  .flow-container {
    grid-column: 1 / 3;
    grid-row: 2 / 3;
    overflow-y: auto;
    padding: 32px 48px 32px 48px;
    background: var(--bg);
  }

  .flow-section {
    margin-bottom: 40px;
  }

  .flow-section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .flow-section-badge {
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    flex-shrink: 0;
  }

  .flow-section-title {
    font-size: 18px;
    font-weight: 600;
  }

  .flow-section-subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* Swimlane */
  .swimlane {
    position: relative;
    display: flex;
    gap: 0;
    min-height: 160px;
  }

  .swimlane-label {
    width: 120px;
    flex-shrink: 0;
    padding: 16px 12px 16px 0;
    text-align: right;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    border-right: 2px solid var(--border);
  }

  .swimlane-content {
    flex: 1;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 0 16px 20px;
    position: relative;
    flex-wrap: wrap;
  }

  /* Flow step card */
  .flow-card {
    background: var(--node-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    min-width: 180px;
    max-width: 240px;
    transition: all 0.2s;
    cursor: default;
    position: relative;
  }

  .flow-card:hover { border-color: var(--accent); }
  .flow-card.active-step { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

  .flow-card-num {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .flow-card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .flow-card-desc {
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-dim);
  }

  .flow-card-cmd {
    margin-top: 8px;
    padding: 6px 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent6);
    word-break: break-all;
  }

  .flow-card-files {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .flow-card-file {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-dim);
    padding: 1px 0;
  }

  /* Arrow between cards */
  .flow-arrow {
    display: flex;
    align-items: center;
    align-self: center;
    color: var(--text-dim);
    font-size: 18px;
    flex-shrink: 0;
    padding: 0 2px;
  }

  /* Handoff divider */
  .handoff-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px 0;
    padding: 0 0 0 132px;
  }

  .handoff-line {
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, var(--accent4), var(--accent2));
    border-radius: 1px;
  }

  .handoff-badge {
    padding: 6px 16px;
    background: var(--surface);
    border: 1px solid var(--accent4);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent4);
    white-space: nowrap;
  }

  /* Delivery contents grid */
  .delivery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    padding: 0 0 0 140px;
    margin-bottom: 8px;
  }

  .delivery-item {
    background: var(--node-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }

  .delivery-item-title {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .delivery-item-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .delivery-item-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .delivery-item-list li {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-dim);
    padding: 1px 0;
  }

  /* Post-install */
  .post-install-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 0 0 0 140px;
  }

  .post-card {
    background: var(--node-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .post-card-num {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--accent2);
    margin-bottom: 6px;
  }

  .post-card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .post-card-desc {
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-dim);
  }

  /* Flow step tracker */
  .flow-tracker {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 0 0 140px;
    margin-bottom: 24px;
  }

  .flow-tracker-step {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: var(--node-bg);
    border: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .flow-tracker-step:first-child { border-radius: 6px 0 0 6px; }
  .flow-tracker-step:last-child { border-radius: 0 6px 6px 0; }
  .flow-tracker-step:hover { background: var(--node-hover); color: var(--text); }
  .flow-tracker-step.highlight { background: rgba(88,166,255,0.1); border-color: var(--accent); color: var(--accent); z-index: 1; }

  .flow-tracker-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<!-- Tab bar -->
<div class="tab-bar">
  <div class="tab-title">IntelliLake Infra<span>Deployment Explorer</span></div>
  <button class="tab-btn active" id="tab-arch-btn">Architecture</button>
  <button class="tab-btn" id="tab-flow-btn">Deployment Flow</button>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- TAB 1: Architecture (existing)                                 -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div class="tab-content active" id="tab-arch">
  <div class="sidebar" id="sidebar-arch">
    <div class="control-group">
      <div class="control-group-header" id="presets-header">Views</div>
      <div class="control-group-body" id="presets"></div>
    </div>
    <div class="control-group">
      <div class="control-group-header" id="layers-header">Layers</div>
      <div class="control-group-body" id="layer-filters"></div>
    </div>
    <div class="control-group">
      <div class="control-group-header" id="conns-header">Connections</div>
      <div class="control-group-body" id="connection-filters"></div>
    </div>
    <div class="control-group">
      <div class="control-group-header" id="tree-header">File Tree</div>
      <div class="control-group-body" id="file-tree" style="font-size:11px; font-family:var(--mono); line-height:1.6; color:var(--text-dim);"></div>
    </div>
  </div>

  <div class="canvas-area" id="canvas-area">
    <div class="canvas-inner" id="canvas-inner">
      <svg class="diagram" id="diagram"></svg>
    </div>
    <div class="detail-panel" id="detail-panel">
      <button class="detail-close" id="detail-close-btn">&times;</button>
      <div id="detail-content"></div>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-out">-</button>
      <div class="zoom-label" id="zoom-label">100%</div>
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-reset" title="Reset view">R</button>
    </div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- TAB 2: Deployment Flow                                         -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div class="tab-content" id="tab-flow">
  <div class="flow-container" id="flow-container"></div>
</div>

<!-- Prompt bar (shared) -->
<div class="prompt-bar">
  <div class="prompt-text" id="prompt-text">Click a node to explore the IntelliLake deployment architecture.</div>
  <button class="copy-btn" id="copy-btn">Copy</button>
</div>

<script>
// ================================================================
// Shared helpers
// ================================================================

function clearChildren(el) {
  while (el.firstChild) el.removeChild(el.firstChild);
}

function createEl(tag, attrs, text) {
  var el = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      if (k === 'className') el.className = attrs[k];
      else if (k === 'style' && typeof attrs[k] === 'object') {
        for (var s in attrs[k]) el.style[s] = attrs[k][s];
      }
      else el.setAttribute(k, attrs[k]);
    }
  }
  if (text !== undefined && text !== null) el.textContent = text;
  return el;
}

function svgEl(tag, attrs) {
  var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  if (attrs) { for (var k in attrs) el.setAttribute(k, attrs[k]); }
  return el;
}

// ================================================================
// Tab switching
// ================================================================

var activeTab = 'arch';

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-arch-btn').classList.toggle('active', tab === 'arch');
  document.getElementById('tab-flow-btn').classList.toggle('active', tab === 'flow');
  document.getElementById('tab-arch').classList.toggle('active', tab === 'arch');
  document.getElementById('tab-flow').classList.toggle('active', tab === 'flow');

  if (tab === 'arch') {
    updateArchPrompt();
  } else {
    updateFlowPrompt();
  }
}

document.getElementById('tab-arch-btn').addEventListener('click', function() { switchTab('arch'); });
document.getElementById('tab-flow-btn').addEventListener('click', function() { switchTab('flow'); });

// ================================================================
// TAB 1: Architecture data & rendering (preserved from original)
// ================================================================

var LAYERS = {
  terraform_modules: { label: 'Terraform Modules', y: 60, color: '#58a6ff' },
  environments: { label: 'Environment Compositions', y: 340, color: '#3fb950' },
  installer: { label: 'Installer Phases', y: 600, color: '#d2a8ff' },
  packaging: { label: 'Packaging & Delivery', y: 860, color: '#f0883e' },
  docs: { label: 'Documentation', y: 1080, color: '#ff7b72' },
};

var CONN_TYPES = {
  module_dep: { label: 'Module dependency', color: '#58a6ff', dash: '' },
  env_uses: { label: 'Environment uses module', color: '#3fb950', dash: '6 3' },
  installer_runs: { label: 'Installer executes', color: '#d2a8ff', dash: '3 3' },
  package_includes: { label: 'Package includes', color: '#f0883e', dash: '8 4' },
  data_flow: { label: 'Data / output flow', color: '#ffa657', dash: '' },
};

// ── Architecture rendering ──

function renderArch() {
  renderDiagram();
  renderArchControls();
  if (activeTab === 'arch') updateArchPrompt();
}

function renderDiagram() {
  var svg = document.getElementById('diagram');
  var svgW = 1860, svgH = 1220;
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);
  clearChildren(svg);

  var layerKeys = Object.keys(LAYERS);
  for (var li = 0; li < layerKeys.length; li++) {
    var layerId = layerKeys[li];
    var layer = LAYERS[layerId];
    var vis = archState.visibleLayers.has(layerId);
    var op = vis ? 1 : 0.1;
    svg.appendChild(svgEl('line', { 'class': 'layer-line', x1: 40, y1: layer.y - 10, x2: svgW - 40, y2: layer.y - 10, style: 'opacity:' + (op * 0.3) }));
    var lbl = svgEl('text', { 'class': 'layer-label', x: 46, y: layer.y + 6, style: 'opacity:' + (op * 0.4) });
    lbl.textContent = layer.label;
    svg.appendChild(lbl);
  }

  for (var ci = 0; ci < connections.length; ci++) {
    var conn = connections[ci];
    var fromNode = null, toNode = null;
    for (var ni = 0; ni < nodes.length; ni++) {
      if (nodes[ni].id === conn.from) fromNode = nodes[ni];
      if (nodes[ni].id === conn.to) toNode = nodes[ni];
    }
    if (!fromNode || !toNode) continue;
    var fv = archState.visibleLayers.has(fromNode.layer);
    var tv = archState.visibleLayers.has(toNode.layer);
    var cv = archState.visibleConnTypes.has(conn.type);
    var anyS = archState.selectedNode !== null;
    var isR = archState.selectedNode === conn.from || archState.selectedNode === conn.to;
    var cls = 'connection';
    if (!fv || !tv || !cv) cls += ' dimmed';
    else if (anyS && !isR) cls += ' dimmed';
    else if (anyS && isR) cls += ' highlighted';
    var ct = CONN_TYPES[conn.type];
    var x1 = fromNode.x + NODE_W/2, y1 = fromNode.y + NODE_H/2;
    var x2 = toNode.x + NODE_W/2, y2 = toNode.y + NODE_H/2;
    var dx = x2-x1, dy = y2-y1;
    var cx1 = x1+dx*0.1, cy1 = y1+dy*0.5, cx2 = x2-dx*0.1, cy2 = y2-dy*0.5;
    var pa = { 'class': cls, d: 'M'+x1+','+y1+' C'+cx1+','+cy1+' '+cx2+','+cy2+' '+x2+','+y2, stroke: ct.color };
    if (ct.dash) pa['stroke-dasharray'] = ct.dash;
    svg.appendChild(svgEl('path', pa));
    var aLen = 8, ang = Math.atan2(y2-cy2, x2-cx2);
    var ax1 = x2-aLen*Math.cos(ang-0.4), ay1 = y2-aLen*Math.sin(ang-0.4);
    var ax2 = x2-aLen*Math.cos(ang+0.4), ay2 = y2-aLen*Math.sin(ang+0.4);
    var aCls = 'connection-arrow';
    if (!fv||!tv||!cv) aCls += ' dimmed'; else if (anyS&&!isR) aCls += ' dimmed'; else if (anyS&&isR) aCls += ' highlighted';
    svg.appendChild(svgEl('polygon', { 'class': aCls, points: x2+','+y2+' '+ax1+','+ay1+' '+ax2+','+ay2, fill: ct.color }));
  }

  for (var i = 0; i < nodes.length; i++) {
    var node = nodes[i];
    var nVis = archState.visibleLayers.has(node.layer);
    var nSel = archState.selectedNode !== null;
    var isThis = archState.selectedNode === node.id;
    var nRel = false;
    for (var ri = 0; ri < connections.length; ri++) {
      var rc = connections[ri];
      if ((rc.from === archState.selectedNode && rc.to === node.id) || (rc.to === archState.selectedNode && rc.from === node.id)) { nRel = true; break; }
    }
    var nCls = 'node-group';
    if (isThis) nCls += ' selected'; else if (!nVis) nCls += ' dimmed'; else if (nSel && !nRel) nCls += ' dimmed';
    var g = svgEl('g', { 'class': nCls, 'data-id': node.id });
    g.addEventListener('click', (function(nid) { return function() { selectNode(nid); }; })(node.id));
    g.appendChild(svgEl('rect', { 'class': 'node-rect', x: node.x, y: node.y, width: NODE_W, height: NODE_H }));
    var bw = node.badge.length * 6.5 + 12;
    g.appendChild(svgEl('rect', { 'class': 'node-badge-bg', x: node.x+10, y: node.y+8, width: bw, height: 16, fill: node.badgeColor }));
    var bt = svgEl('text', { 'class': 'node-badge', x: node.x+10+bw/2, y: node.y+19, 'text-anchor': 'middle', fill: node.badgeColor });
    bt.textContent = node.badge; g.appendChild(bt);
    var tt = svgEl('text', { 'class': 'node-title', x: node.x+10, y: node.y+42 });
    tt.textContent = node.label; g.appendChild(tt);
    var sp = node.path.length > 28 ? '...' + node.path.slice(-25) : node.path;
    var st = svgEl('text', { 'class': 'node-subtitle', x: node.x+10, y: node.y+58 });
    st.textContent = sp; g.appendChild(st);
    svg.appendChild(g);
  }
  updateArchTransform();
}

function renderArchControls() {
  var pe = document.getElementById('presets');
  clearChildren(pe);
  var pk = Object.keys(PRESETS);
  for (var i = 0; i < pk.length; i++) {
    var b = createEl('button', { className: 'preset-btn' + (archState.activePreset === pk[i] ? ' active' : '') }, PRESETS[pk[i]].label);
    b.addEventListener('click', (function(id) { return function() { applyPreset(id); }; })(pk[i]));
    pe.appendChild(b);
  }

  var le = document.getElementById('layer-filters');
  clearChildren(le);
  var lk = Object.keys(LAYERS);
  for (var j = 0; j < lk.length; j++) {
    var fb = createEl('button', { className: 'filter-btn' + (archState.visibleLayers.has(lk[j]) ? ' active' : '') });
    var d = createEl('span', { className: 'filter-dot' }); d.style.background = LAYERS[lk[j]].color;
    fb.appendChild(d); fb.appendChild(document.createTextNode(LAYERS[lk[j]].label));
    fb.addEventListener('click', (function(id) { return function() { toggleLayer(id); }; })(lk[j]));
    le.appendChild(fb);
  }

  var ce = document.getElementById('connection-filters');
  clearChildren(ce);
  var ck = Object.keys(CONN_TYPES);
  for (var c = 0; c < ck.length; c++) {
    var cfb = createEl('button', { className: 'filter-btn' + (archState.visibleConnTypes.has(ck[c]) ? ' active' : '') });
    var cd = createEl('span', { className: 'filter-dot' }); cd.style.background = CONN_TYPES[ck[c]].color;
    cfb.appendChild(cd); cfb.appendChild(document.createTextNode(CONN_TYPES[ck[c]].label));
    cfb.addEventListener('click', (function(id) { return function() { toggleConnType(id); }; })(ck[c]));
    ce.appendChild(cfb);
  }

  var lg = document.getElementById('legend');
  clearChildren(lg);
  for (var l = 0; l < ck.length; l++) {
    if (!archState.visibleConnTypes.has(ck[l])) continue;
    var it = createEl('span', { className: 'legend-item' });
    var ll = createEl('span', { className: 'legend-line' }); ll.style.background = CONN_TYPES[ck[l]].color;
    it.appendChild(ll); it.appendChild(document.createTextNode(CONN_TYPES[ck[l]].label));
    lg.appendChild(it);

function selectNode(id) {
  if (archState.selectedNode === id) { archState.selectedNode = null; closeDetail(); }
  else { archState.selectedNode = id; showDetail(id); }
  renderArch();
}

function showDetail(id) {
  var node = null;
  for (var i = 0; i < nodes.length; i++) { if (nodes[i].id === id) { node = nodes[i]; break; } }
  if (!node) return;
  var panel = document.getElementById('detail-panel');
  var content = document.getElementById('detail-content');
  clearChildren(content);
  content.appendChild(createEl('div', { className: 'detail-title' }, node.label));
  content.appendChild(createEl('div', { className: 'detail-path' }, node.path));
  content.appendChild(createEl('div', { className: 'detail-desc' }, node.desc));
  if (node.details && node.details.length) {
    content.appendChild(createEl('div', { className: 'detail-section-title' }, 'Key Details'));
    var ul = createEl('ul', { className: 'detail-list' });
    for (var d = 0; d < node.details.length; d++) ul.appendChild(createEl('li', null, node.details[d]));
    content.appendChild(ul);
  }
  if (node.tags && node.tags.length) {
    content.appendChild(createEl('div', { className: 'detail-section-title' }, 'Resources'));
    var td = document.createElement('div');
    for (var t = 0; t < node.tags.length; t++) td.appendChild(createEl('span', { className: 'detail-tag' }, node.tags[t]));
    content.appendChild(td);
  }
  var inc = [], out = [];
  for (var ci = 0; ci < connections.length; ci++) {
    if (connections[ci].to === id) inc.push(connections[ci]);
    if (connections[ci].from === id) out.push(connections[ci]);
  }
  if (inc.length) {
    content.appendChild(createEl('div', { className: 'detail-section-title' }, 'Incoming'));
    var iu = createEl('ul', { className: 'detail-list' });
    for (var ii = 0; ii < inc.length; ii++) {
      var src = null; for (var si = 0; si < nodes.length; si++) { if (nodes[si].id === inc[ii].from) { src = nodes[si]; break; } }
      var txt = (src ? src.label : inc[ii].from); if (inc[ii].label) txt += ' (' + inc[ii].label + ')';
      iu.appendChild(createEl('li', null, txt));
    }
    content.appendChild(iu);
  }
  if (out.length) {
    content.appendChild(createEl('div', { className: 'detail-section-title' }, 'Outgoing'));
    var ou = createEl('ul', { className: 'detail-list' });
    for (var oi = 0; oi < out.length; oi++) {
      var tgt = null; for (var ti = 0; ti < nodes.length; ti++) { if (nodes[ti].id === out[oi].to) { tgt = nodes[ti]; break; } }
      var otxt = (tgt ? tgt.label : out[oi].to); if (out[oi].label) otxt += ' (' + out[oi].label + ')';
      ou.appendChild(createEl('li', null, otxt));
    }
    content.appendChild(ou);
  }
  panel.classList.add('visible');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
  archState.selectedNode = null;
  renderArch();
}

  archState.activePreset = id; archState.visibleLayers = new Set(PRESETS[id].layers); archState.visibleConnTypes = new Set(PRESETS[id].conns); archState.selectedNode = null;

  document.getElementById('zoom-label').textContent = Math.round(archState.zoom*100)+'%';
}

document.getElementById('canvas-area').addEventListener('mousedown', function(e) {
  if (e.target.closest('.detail-panel') || e.target.closest('.zoom-controls') || e.target.closest('.legend') || e.target.closest('.node-group')) return;
  isPanning = true; panStartX = e.clientX - archState.panX; panStartY = e.clientY - archState.panY;
});
window.addEventListener('mousemove', function(e) { if (!isPanning) return; archState.panX = e.clientX - panStartX; archState.panY = e.clientY - panStartY; updateArchTransform(); });
window.addEventListener('mouseup', function() { isPanning = false; });

function updateArchPrompt() {
  var vn = nodes.filter(function(n) { return archState.visibleLayers.has(n.layer); });
  var prompt = '';
  if (archState.selectedNode) {
    var node = null; for (var i = 0; i < nodes.length; i++) { if (nodes[i].id === archState.selectedNode) { node = nodes[i]; break; } }
    if (node) {
      var rel = [];
      for (var ci = 0; ci < connections.length; ci++) {
        var c = connections[ci];
        if (c.from === node.id || c.to === node.id) {
          var oid = c.from === node.id ? c.to : c.from;
          for (var ni = 0; ni < nodes.length; ni++) { if (nodes[ni].id === oid) { rel.push(nodes[ni].label); break; } }
        }
      }
      prompt = 'Tell me about the ' + node.label + ' component at ' + node.path + '. ' + node.desc;
      if (rel.length) prompt += ' It connects to: ' + rel.join(', ') + '.';
    }
  } else if (archState.activePreset && PRESETS[archState.activePreset]) {
    var p = PRESETS[archState.activePreset];
    prompt = 'Show me the IntelliLake ' + p.label.toLowerCase() + ' architecture covering: ' + p.layers.map(function(l){ return LAYERS[l].label; }).join(', ') + '. ' + vn.length + ' components visible.';
  } else {
    prompt = 'The IntelliLake infrastructure has ' + nodes.length + ' components across ' + Object.keys(LAYERS).length + ' layers. Currently showing ' + vn.length + ' components.';
  }
  document.getElementById('prompt-text').textContent = prompt;
}

    postCard.appendChild(createEl('div', { className: 'post-card-desc' }, postCards[pci].desc));
    postGrid.appendChild(postCard);
  }
  s4.appendChild(postGrid);
  container.appendChild(s4);

  // ── Section 5: Resumability ──
  var s5 = createEl('div', { className: 'flow-section' });
  var h5 = createEl('div', { className: 'flow-section-header' });
  var b5 = createEl('span', { className: 'flow-section-badge' }, 'RECOVERY');
  b5.style.background = 'rgba(210,168,255,0.15)'; b5.style.color = '#d2a8ff'; b5.style.border = '1px solid rgba(210,168,255,0.3)';
  h5.appendChild(b5);
  h5.appendChild(createEl('span', { className: 'flow-section-title' }, 'Resumability & Re-runs'));
  s5.appendChild(h5);

  var resumeLane = createEl('div', { className: 'swimlane' });
  resumeLane.appendChild(createEl('div', { className: 'swimlane-label' }, 'If Interrupted'));
  var resumeContent = createEl('div', { className: 'swimlane-content' });
  var resumeCards = [
    { title: 'Resume All', desc: 'Loads .install-state, skips completed phases, continues from where it stopped.', cmd: './il-install.sh --resume' },
    { title: 'Re-run Phase', desc: 'Re-execute a specific phase via orchestrator. Idempotent: skips if already current.', cmd: './il-install.sh --phase deploy' },
    { title: 'Run Standalone', desc: 'Each phase is a standalone script. Run directly without the orchestrator.', cmd: './phases/03-secrets.sh --dry-run' },
    { title: 'Force Re-run', desc: 'Override idempotency checks. Re-executes even if the phase detects no changes.', cmd: './il-install.sh --phase secrets --force' },
    { title: 'Dry Run', desc: 'Shows what would happen without making changes. Mutations show [DRY RUN] prefix.', cmd: './il-install.sh --dry-run' },
  ];
  for (var rci = 0; rci < resumeCards.length; rci++) {
    var rc = createEl('div', { className: 'flow-card' });
    var rn = createEl('div', { className: 'flow-card-num' }, 'OPTION'); rn.style.color = '#d2a8ff';
    rc.appendChild(rn);
    rc.appendChild(createEl('div', { className: 'flow-card-title' }, resumeCards[rci].title));
    rc.appendChild(createEl('div', { className: 'flow-card-desc' }, resumeCards[rci].desc));
    rc.appendChild(createEl('div', { className: 'flow-card-cmd' }, resumeCards[rci].cmd));
    resumeContent.appendChild(rc);
  }
  resumeLane.appendChild(resumeContent);
  s5.appendChild(resumeLane);
  container.appendChild(s5);
}

var phasePromptMap = {
  pre: 'Phase 0 (Preflight) — scripts/phases/00-preflight.sh. Validates AWS CLI v2+, Terraform 1.5+, jq, curl, and openssl are installed, and that AWS credentials are configured. Each phase also lazy-validates only the tools it needs (e.g. Phase 2 checks terraform but not curl). Runnable standalone: ./phases/00-preflight.sh',
  cfg: 'Phase 1 (Configure) — scripts/phases/01-configure.sh. Interactive wizard collecting environment name (not "tenant ID" — renamed for clarity), AWS region, network allowlist (with guided examples: office IP, VPN range, checkip.amazonaws.com tip), EC2/DocDB sizing, Snowflake credentials, and auth provider. Sensitive fields require double-entry confirmation. Saves to .install-state (chmod 600) for resumability. Idempotent: skips if all required keys present and terraform.tfvars exists. Reads .il-version for default image version.',
  inf: 'Phase 2 (Infrastructure) — scripts/phases/02-infra.sh. Runs terraform init/plan/apply to provision VPC, EC2, DocumentDB, load balancers, IAM roles, and Secrets Manager. Idempotent via terraform plan -detailed-exitcode: exit 0 = no changes (skips apply, still refreshes outputs), exit 2 = changes pending (shows plan, confirms, applies). Takes ~25 minutes on first run.',
  sec: 'Phase 3 (Secrets) — scripts/phases/03-secrets.sh. Solves the bootstrap problem: Terraform created the secret shell, but the DocDB endpoint was not known until Phase 2 completed. Populates the secret with connection string and Snowflake credentials. Idempotent: reads live secret from Secrets Manager, compares with jq -S sorted keys — skips write if values match.',
  dep: 'Phase 4 (Deploy) — scripts/phases/04-deploy.sh. SSMs into EC2, authenticates to IntelliLake ECR (cross-account pull), downloads Docker images and DocumentDB TLS certificate, starts API and web containers. Idempotent: checks running container image tags via SSM docker inspect — skips pull/restart if target version already running. Supports air-gapped (manual tar) path.',
  ver: 'Phase 5 (Verify) — scripts/phases/05-verify.sh. Health checks via SSM against both containers, verifies Secrets Manager entry, prints infrastructure summary and DNS CNAME records. Lists remaining manual steps (HTTPS cert, Entra ID redirect URIs). Offers to delete .install-state after successful install (contains plaintext passwords, all now in Secrets Manager).',
};

function updateFlowPrompt() {
  var prompt = '';
  if (flowHighlight && phasePromptMap[flowHighlight]) {
    prompt = phasePromptMap[flowHighlight];
  } else {
    prompt = 'Client deployment flow: IL team runs scripts/package-client-infra.sh to bundle 7 TF modules + modular installer (orchestrator + lib/common.sh + 6 phase scripts) + docs into a versioned zip with embedded .il-version. Client runs ./il-install.sh which orchestrates 6 idempotent phases: preflight → configure → infrastructure (~25 min) → secrets bootstrap → deploy containers → verify. Each phase is standalone-runnable (./phases/0N-*.sh), lazy-validates only its own tools, skips if already up-to-date (--force to override), and supports --resume/--dry-run. Sensitive fields use printf -v (no eval), double-entry confirmation, chmod 600 state file, with deletion prompt after install. Post-install: DNS CNAMEs, HTTPS cert, Entra ID redirect URIs.';
  }
  document.getElementById('prompt-text').textContent = prompt;
}

// ================================================================
// Copy button
// ================================================================

document.getElementById('copy-btn').addEventListener('click', function() {
  var text = document.getElementById('prompt-text').textContent;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
});

// ================================================================
// Init
// ================================================================

renderArch();
renderFlow();

</script>
